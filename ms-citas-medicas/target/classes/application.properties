# ---------- Servidor ----------
server.port=8082

# ---------- Nombre de la aplicacion ----------
spring.application.name=ms-citas-medicas


# ---------- Conexion a Oracle Cloud Autonomous Database (19c) ----------
# Formato JDBC con wallet:
#   jdbc:oracle:thin:@<servicio_tns>?TNS_ADMIN=<ruta_wallet_descomprimido>
#
# TNS service:  duocuc_low (optimizado para apps con muchas conexiones)
# Wallet:       descomprimido en C:\Users\Piaflan\Documents\Wallet_DuocUC
# Usuario:      creado por el script sql/01_crea_usuario_DSY2201.sql
spring.datasource.url=jdbc:oracle:thin:@duocuc_low?TNS_ADMIN=C:/Users/Piaflan/Documents/Wallet_DuocUC
spring.datasource.username=DSY2201_S6
spring.datasource.password=Semana6Duoc#2026
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver


# ---------- Conexion a Oracle XE LOCAL (solo si no usas Cloud) ----------
# Si trabajas con Oracle XE 21c instalado localmente, comenta las 4 lineas
# anteriores y descomenta estas:
# spring.datasource.url=jdbc:oracle:thin:@localhost:1521/XEPDB1
# spring.datasource.username=DSY2201_S6
# spring.datasource.password=DuocDsy2201_S6
# spring.datasource.driver-class-name=oracle.jdbc.OracleDriver


# ---------- Pool de conexiones (HikariCP - default) ----------
# Valores conservadores para Oracle Cloud (tiene limite de sesiones concurrentes)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000


# ---------- JPA / Hibernate ----------
# Dialecto de Oracle compatible con Oracle 12c+ (incluye 19c y 21c)
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect

# Estrategia de gestion del esquema:
#   none     -> no toca el esquema (recomendado si usas el script SQL)
#   validate -> valida que las entidades coincidan con las tablas existentes
#   update   -> actualiza el esquema sin borrar datos
#   create   -> crea el esquema al arrancar (borra datos existentes)
# Usamos "validate" porque las tablas se crean con el script SQL.
spring.jpa.hibernate.ddl-auto=none

# Muestra las consultas SQL generadas en la consola (util para depuracion)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Evita warnings de OpenInView (buena practica en microservicios)
spring.jpa.open-in-view=false


# ---------- Jackson ----------
# Respeta el formato del JSON recibido (no falla por propiedades desconocidas)
spring.jackson.deserialization.fail-on-unknown-properties=false
# Serializa fechas en formato ISO (no como timestamps epoch)
spring.jackson.serialization.write-dates-as-timestamps=false


# ---------- Logging (Semana 6) ----------
# Nivel global en INFO para produccion; DEBUG para paquetes propios en desarrollo
logging.level.root=INFO
logging.level.com.duoc.citasmedicas=DEBUG

# Logs especificos de Spring y Hibernate (bajar a WARN reduce ruido)
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Patron de salida en consola
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n
