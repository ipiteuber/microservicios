# ---------- Pool de conexiones (HikariCP - default) ----------
# Valores conservadores para Oracle Cloud (tiene limite de sesiones concurrentes)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000


# ---------- JPA / Hibernate ----------
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect

# "validate" verifica que las entidades coincidan con las tablas ya creadas
# por el script SQL. Otras opciones: none, update, create, create-drop.
spring.jpa.hibernate.ddl-auto=none

# Muestra las consultas SQL generadas en consola (util para depuracion)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Evita warnings de OpenInView
spring.jpa.open-in-view=false


# ---------- Jackson ----------
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.serialization.write-dates-as-timestamps=false


# ---------- Logging (Semana 6) ----------
logging.level.root=INFO
logging.level.com.duoc.ordenesmascotas=DEBUG

logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n
