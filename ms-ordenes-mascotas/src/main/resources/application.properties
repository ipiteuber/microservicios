#   jdbc:oracle:thin:@<servicio_tns>?TNS_ADMIN=<ruta_wallet_descomprimido>
#
# TNS service:  duocuc_low (optimizado para apps con muchas conexiones)
# Wallet:       descomprimido en C:\Users\Piaflan\Documents\Wallet_DuocUC
# Usuario:      creado por el script sql/01_crea_usuario_DSY2201.sql
spring.datasource.url=jdbc:oracle:thin:@duocuc_low?TNS_ADMIN=C:/Users/Piaflan/Documents/Wallet_DuocUC
spring.datasource.username=DSY2201_S6
spring.datasource.password=Semana6Duoc#2026
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver


# ---------- Conexion a Oracle XE LOCAL (solo si no usas Cloud) ----------
# spring.datasource.url=jdbc:oracle:thin:@localhost:1521/XEPDB1
# spring.datasource.username=DSY2201_S6
# spring.datasource.password=DuocDsy2201_S6
